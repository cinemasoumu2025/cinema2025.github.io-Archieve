<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>検索画面</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
}

.header{

  background:#111;
  color:white;

  padding:20px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout-btn{

  background:#c0392b;
  color:white;

  border:none;

  padding:10px 20px;

  border-radius:999px;

  cursor:pointer;
}

.content{
  padding:30px;
}

.search-box{

  background:white;

  padding:20px;

  border-radius:12px;
}

</style>
</head>

<body>

<div class="header">

  <div id="welcomeText"></div>

  <button
    class="logout-btn"
    onclick="logout()"
  >
    ログアウト
  </button>

</div>


<div class="content">

  <div class="search-box">

    <h2>検索画面</h2>

    <input
      type="text"
      placeholder="検索"
    >

  </div>

</div>


<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbybIjQ2GajOnXpOh0bQd1Wd1Y2yUYjtiKwF67H7-ZfiWvd9XaQqO_0RLv0bPQn7WkiB7g/exec";


const loginData =
JSON.parse(
  sessionStorage.getItem("loginData")
);


if(!loginData){

  location.href = "index.html";

}


document.getElementById("welcomeText")
.innerText =
`ようこそ ${loginData.name} さん（${loginData.roleName}）`;



async function logout(){

  try{

    if(loginData.logRow){

      await fetch(GAS_URL,{

        method:"POST",

        body:JSON.stringify({

          action:"logout",

          row:loginData.logRow

        })

      });

    }

  }catch(e){}

  sessionStorage.clear();

  location.href = "index.html";

}

</script>

</body>
</html>
