<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ログイン</title>

<style>

:root{
  --black:#0f0f12;
  --gold:#c6a85a;
  --gold-light:#e7d7a3;
}

body{
  margin:0;
  background:#111;
  color:white;
  font-family:"Yu Mincho",serif;

  display:flex;
  justify-content:center;
  align-items:center;

  height:100vh;
}

.container{
  width:380px;
}

.card{
  background:#1d1d22;
  padding:30px;
  border-radius:16px;
  margin-bottom:20px;
}

h1,h2{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  box-sizing:border-box;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;

  border:none;
  border-radius:999px;

  background:linear-gradient(135deg,var(--gold),var(--gold-light));

  cursor:pointer;
  font-weight:bold;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);

  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-content{
  background:white;
  color:black;

  padding:30px;
  width:300px;

  border-radius:12px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

  <h1>資料室ログイン</h1>

  <div class="card">

    <h2>部員ログイン</h2>

    <input type="text" id="userId" placeholder="ID">

    <input type="password" id="password" placeholder="パスワード">

    <button onclick="login()">
      ログイン
    </button>

  </div>

  <div class="card">

    <h2>ゲスト入室</h2>

    <input type="text" id="guestName" placeholder="名前">

    <button onclick="guestLogin()">
      入室
    </button>

  </div>

</div>


<div id="modal" class="modal">

  <div class="modal-content">

    <h3>エラー</h3>

    <p id="modalMessage"></p>

    <button onclick="closeModal()">
      OK
    </button>

  </div>

</div>


<script>

const GAS_URL =
"https://script.google.com/macros/s/XXXXXXXXXXXX/exec";


async function login(){

  const userId =
    document.getElementById("userId").value.trim();

  const password =
    document.getElementById("password").value.trim();

  try{

    const res = await fetch(GAS_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"login",
        userId,
        password
      })
    });

    const result = await res.json();

    if(!result.success){

      showError(
        "IDまたはパスワードを入力してください"
      );

      return;
    }

    sessionStorage.setItem(
      "loginData",
      JSON.stringify(result.user)
    );

    window.location.href = "search.html";

  }catch(e){

    showError("通信エラー");

  }

}



function guestLogin(){

  const name =
    document.getElementById("guestName").value.trim();

  if(!name){

    showError("名前を入力してください");

    return;
  }

  sessionStorage.setItem(
    "loginData",
    JSON.stringify({
      id:"guest",
      name:name,
      level:5,
      roleName:"ゲスト",
      logRow:null
    })
  );

  window.location.href = "search.html";

}



function showError(msg){

  document.getElementById("modalMessage")
    .innerText = msg;

  document.getElementById("modal")
    .classList.add("active");
}

function closeModal(){

  document.getElementById("modal")
    .classList.remove("active");

}

</script>

</body>
</html>
